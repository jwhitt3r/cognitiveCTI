volumes:
  n8n_storage:
  postgres_storage:
  ollama_storage:
  qdrant_storage:
  ti_pg_data:
  neo4j_data:
  neo4j_logs:

networks:
  demo:

x-n8n: &service-n8n
  image: n8nio/n8n:latest
  networks: 
    - demo
  environment:
    - DB_TYPE=postgresdb
    - DB_POSTGRESDB_HOST=postgres
    - DB_POSTGRESDB_USER=${POSTGRES_USER}
    - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
    - N8N_DIAGNOSTICS_ENABLED=false
    - N8N_PERSONALIZATION_ENABLED=false
    - N8N_ENCRYPTION_KEY
    - N8N_USER_MANAGEMENT_JWT_SECRET
    - OLLAMA_HOST=${OLLAMA_HOST:-ollama:11434}
    - N8N_RESTRICT_FILE_ACCESS_TO=/data/malware-staging
  env_file:
    - path: .env
      required: true

x-ollama: &service-ollama
  image: ollama/ollama:latest
  container_name: ollama
  networks: ['demo']
  restart: unless-stopped
  ports:
    - 11434:11434
  volumes:
    - ollama_storage:/root/.ollama

x-init-ollama: &init-ollama
  image: ollama/ollama:latest
  networks: ['demo']
  container_name: ollama-pull-llama
  volumes:
    - ollama_storage:/root/.ollama
  entrypoint: /bin/sh
  environment:
    - OLLAMA_HOST=ollama:11434
  command:
    - "-c"
    - "sleep 3; ollama pull llama3.2"

services:

  # ═══════════════════════════════════════════════════════════════════════════
  # EXISTING N8N STACK — DO NOT MODIFY
  # ═══════════════════════════════════════════════════════════════════════════

  postgres:
    image: postgres:16-alpine
    hostname: postgres
    networks: ['demo']
    restart: unless-stopped
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
    volumes:
      - postgres_storage:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h localhost -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10

  n8n-import:
    <<: *service-n8n
    hostname: n8n-import
    container_name: n8n-import
    entrypoint: /bin/sh
    command:
    - "-c"
    - |
      if [ -z "$(n8n list:workflow --onlyId)" ]; then
        n8n import:credentials --separate --input=/demo-data/credentials && \
        n8n import:workflow --separate --input=/demo-data/workflows
      else
        echo "Workflows exist, skipping import"
      fi
    volumes:
      - ./n8n/demo-data:/demo-data
    depends_on:
      postgres:
        condition: service_healthy

  n8n:
    <<: *service-n8n
    hostname: n8n
    container_name: n8n
    restart: unless-stopped
    ports:
      - 5678:5678
    entrypoint: /bin/sh
    command:
      - "-c"
      - |
        mkdir -p /data/malware-staging/$(date +%Y-%m-%d)
        n8n start
    volumes:
      - n8n_storage:/home/node/.n8n
      - ./n8n/demo-data:/demo-data
      - ./shared:/data/shared
      - F:\MalwareSamples:/data/malware-staging
    depends_on:
      postgres:
        condition: service_healthy
      n8n-import:
        condition: service_completed_successfully

  qdrant:
    image: qdrant/qdrant
    hostname: qdrant
    container_name: qdrant
    networks: ['demo']
    restart: unless-stopped
    ports:
      - 6333:6333
    volumes:
      - qdrant_storage:/qdrant/storage

  ollama-cpu:
    profiles: ["cpu"]
    <<: *service-ollama

  ollama-gpu:
    profiles: ["gpu-nvidia"]
    <<: *service-ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  ollama-gpu-amd:
    profiles: ["gpu-amd"]
    <<: *service-ollama
    image: ollama/ollama:rocm
    devices:
      - "/dev/kfd"
      - "/dev/dri"

  ollama-pull-llama-cpu:
    profiles: ["cpu"]
    <<: *init-ollama
    depends_on:
      - ollama-cpu

  ollama-pull-llama-gpu:
    profiles: ["gpu-nvidia"]
    <<: *init-ollama
    depends_on:
      - ollama-gpu

  ollama-pull-llama-gpu-amd:
    profiles: [gpu-amd]
    <<: *init-ollama
    image: ollama/ollama:rocm
    depends_on:
     - ollama-gpu-amd

  # ═══════════════════════════════════════════════════════════════════════════
  # THREAT INTELLIGENCE PLATFORM — New services
  # ═══════════════════════════════════════════════════════════════════════════

  # ─── Threat Intel PostgreSQL (separate instance from N8N's postgres) ─────
  # External port 5433 to avoid conflict with N8N's postgres
  # From N8N workflow nodes, connect using:
  #   Host: ti-postgres    Port: 5432
  #   Database: threat_reports
  #   User: threatintel    Password: threatintel_pass
  ti-postgres:
    image: postgres:16-alpine
    hostname: ti-postgres
    container_name: ti_postgres
    networks: ['demo']
    restart: unless-stopped
    environment:
      POSTGRES_DB: threat_reports
      POSTGRES_USER: threatintel
      POSTGRES_PASSWORD: threatintel_pass
    ports:
      - "5433:5432"
    volumes:
      - ti_pg_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U threatintel -d threat_reports"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Neo4j — Graph Analysis ──────────────────────────────────────────────
  # Browser UI: http://localhost:7474
  # Bolt:       bolt://localhost:7687
  # Credentials: neo4j / neo4j_pass
  neo4j:
    image: neo4j:5-community
    hostname: neo4j
    container_name: ti_neo4j
    networks: ['demo']
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/neo4j_pass
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  # ─── pgAdmin (optional — comment out if not needed) ─────────────────────
  # Web UI: http://localhost:5050
  # Login:  admin@domain.io / admin
  # When adding a server in pgAdmin, use:
  #   N8N DB:     host=postgres       port=5432
  #   Threat DB:  host=ti-postgres    port=5432
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ti_pgadmin
    networks: ['demo']
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@domain.io
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      ti-postgres:
        condition: service_healthy

  # ─── RSS Feed Ingestor, used for Telegram public channels ─────────────────────
  rss-bridge:
    image: rssbridge/rss-bridge:latest
    ports:
      - "3000:80"
    restart: unless-stopped
    networks: ['demo']

    